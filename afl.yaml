openapi: 3.0.1
info:
  title: UVDO-CAMEL-ADAPTER SWAGGER
  version: 1.0.0
servers:
  - url: https://sbt-odo-002.delta.sbrf.ru/
  - url: https://sbt-odo-001.delta.sbrf.ru/
tags:

  - name: Открытие АФЛ
  - name: Изменение АФЛ
  - name: Отзыв АФЛ
  - name: Трансферация АФЛ
  - name: Передача документов для раскрытия
  - name: Получение запроса на подтверждение заявления
  - name: Получение согласия на запрос выписки
  - name: Получение референса и доп. условий


paths:
  /efs-lc/conditions:
    post:
      tags:
        - Получение референса и доп. условий
      summary: Сервис получения референса и доп. условий
      operationId: lcConditions
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcConditionsRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcConditionsRs"
        400:
          description: Bad request
          content: {}
        401:
          description: Unauthorized
          content: {}
        403:
          description: Forbidden
          content: {}
        404:
          description: Not Found
          content: {}
        500:
          description: Internal service error
          content: {}
        503:
          description: Service Unavaliable
          content: {}
  /efs-lc/amendment:
    post:
      tags:
        - Изменение АФЛ
      summary: Сервис заявления на изменение АФЛ
      operationId: lcAmendment
      parameters:
        - in: header
          name: operationID
          schema:
            type: string
            default: '45678909876545678'
          required: true
        - in: header
          name: ufsZone
          schema:
            type: string
            default: '33243242242234234'
          required: true
        - in: header
          name: x-request-id
          schema:
            type: string
            default: '123456543456468456563536664563617502'
          required: true
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcAmendRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcAmendRs"
        400:
          description: Bad request
          content: { }
        401:
          description: Unauthorized
          content: { }
        403:
          description: Forbidden
          content: { }
        404:
          description: Not Found
          content: { }
        500:
          description: Internal service error
          content: { }
        503:
          description: Service Unavaliable
          content: { }
  /efs-lc/issue:
    post:
      tags:
        - Открытие АФЛ
      summary: Сервис по открытию АФЛ
      operationId: lcIssue
      parameters:
        - in: header
          name: operationID
          schema:
            type: string
            default: '45678909876545678'
          required: true
        - in: header
          name: ufsZone
          schema:
            type: string
            default: zonneeee
          required: true
        - in: header
          name: x-request-id
          schema:
            type: string
            default: '123456543456468456563536664563617502'
          required: true
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcIssueRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcIssueRs"
        400:
          description: Bad request
          content: { }
        401:
          description: Unauthorized
          content: { }
        403:
          description: Forbidden
          content: { }
        404:
          description: Not Found
          content: { }
        500:
          description: Internal service error
          content: { }
        503:
          description: Service Unavaliable
          content: { }
  /efs-lc/revoke:
    post:
      tags:
        - Отзыв АФЛ
      summary: Сервис по отзыву АФЛ
      operationId: lcRevoke
      parameters:
        - in: header
          name: Content-Type
          schema:
            type: string
            default: 'application/xml'
          required: true
        - in: header
          name: operationID
          schema:
            type: string
            default: '45678909876545678'
          required: true
        - in: header
          name: ufsZone
          schema:
            type: string
            default: 'zonneeee'
          required: true
        - in: header
          name: LcChannel
          schema:
            type: string
            default: 'SBOL_PRO'
          required: true
        - in: header
          name: x-request-id
          schema:
            type: string
            default: 'a982-5114-48asdf97-0f-430595cc7b'
          required: true
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcRevokeRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcRevokeRs"
        400:
          description: Bad request
          content: { }
        401:
          description: Unauthorized
          content: { }
        403:
          description: Forbidden
          content: { }
        404:
          description: Not Found
          content: { }
        500:
          description: Internal service error
          content: { }
        503:
          description: Service Unavaliable
          content: { }
  /efs-lc/transfer:
    post:
      tags:
        - Трансферация АФЛ
      summary: Сервис заявления на трансферацию АФЛ
      operationId: lcTransfer
      parameters:
        - in: header
          name: Content-Type
          schema:
            type: string
            default: 'application/xml'
          required: true
        - in: header
          name: operationID
          schema:
            type: string
            default: '45678909876545678'
          required: true
        - in: header
          name: ufsZone
          schema:
            type: string
            default: 'zonneeee'
          required: true
        - in: header
          name: LcChannel
          schema:
            type: string
            default: 'SBOL_PRO'
          required: true
        - in: header
          name: x-request-id
          schema:
            type: string
            default: 'a982-5114-48asdf97-0f-430595cc7b'
          required: true
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcTransferRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcTransferRs"
        400:
          description: Bad request
          content: { }
        401:
          description: Unauthorized
          content: { }
        403:
          description: Forbidden
          content: { }
        404:
          description: Not Found
          content: { }
        500:
          description: Internal service error
          content: { }
        503:
          description: Service Unavaliable
          content: { }
  /efs-lc/confirmation:
    post:
      tags:
        - Получение запроса на подтверждение заявления
      summary: Сервис получения запроса на потверждение заявления
      operationId: lcConfirmation
      parameters:
        - in: header
          name: Content-Type
          schema:
            type: string
            default: 'application/xml'
          required: true
        - in: header
          name: operationID
          schema:
            type: string
            default: '45678909876545678'
          required: true
        - in: header
          name: ufsZone
          schema:
            type: string
            default: 'zonneeee'
          required: true
        - in: header
          name: LcChannel
          schema:
            type: string
            default: 'SBOL_PRO'
          required: true
        - in: header
          name: x-request-id
          schema:
            type: string
            default: 'a982-5114-48asdf97-0f-430595cc7b'
          required: true
        - in: header
          name: eventType
          schema:
            type: string
            enum:
              - AMENDMENT_CONSENTED
              - AMENDMENT_REFUSED
              - REVOCATION_CONSENTED
              - REVOCATION_REFUSED
              - DISCREPANCIES_REFUSED
              - DISCREPANCIES_CONSENTED
          required: true
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcApplicationAcceptRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcApplicationAcceptRs"
        400:
          description: Bad request
          content: { }
        401:
          description: Unauthorized
          content: { }
        403:
          description: Forbidden
          content: { }
        404:
          description: Not Found
          content: { }
        500:
          description: Internal service error
          content: { }
        503:
          description: Service Unavaliable
          content: { }
  /efs-lc/consent-extract:
    post:
      tags:
        - Получение согласия на запрос выписки
      summary: Сервис получения согласия на запрос выписки
      operationId: lcConsentExtract
      parameters:
        - in: header
          name: Content-Type
          schema:
            type: string
            default: 'application/xml'
          required: true
        - in: header
          name: operationID
          schema:
            type: string
            default: '45678909876545678'
          required: true
        - in: header
          name: ufsZone
          schema:
            type: string
            default: 'zonneeee'
          required: true
        - in: header
          name: LcChannel
          schema:
            type: string
            default: 'SBOL_PRO'
          required: true
        - in: header
          name: x-request-id
          schema:
            type: string
            default: 'a982-5114-48asdf97-0f-430595cc7b'
          required: true
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcConsentExtractRequestRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcConsentExtractRequestRs"
        400:
          description: Bad request
          content: { }
        401:
          description: Unauthorized
          content: { }
        403:
          description: Forbidden
          content: { }
        404:
          description: Not Found
          content: { }
        500:
          description: Internal service error
          content: { }
        503:
          description: Service Unavaliable
          content: { }
  /efs-lc/documents-for-execution:
    post:
      tags:
        - Передача документов для раскрытия
      summary: Сервис передачи документов для раскрытия
      operationId: lcDocumentsForExecution
      parameters:
        - in: header
          name: Content-Type
          schema:
            type: string
            default: 'application/xml'
          required: true
        - in: header
          name: operationID
          schema:
            type: string
            default: '45678909876545678'
          required: true
        - in: header
          name: ufsZone
          schema:
            type: string
            default: 'zonneeee'
          required: true
        - in: header
          name: LcChannel
          schema:
            type: string
            default: 'SBOL_PRO'
          required: true
        - in: header
          name: x-request-id
          schema:
            type: string
            default: 'a982-5114-48asdf97-0f-430595cc7b'
          required: true
      requestBody:
        description: Тело запроса
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/lcDocumentsForExecutionRq'
        required: true
      responses:
        200:
          description: OK
          content:
            application/xml:
              schema:
                $ref: "#/components/schemas/lcDocumentsForExecutionRs"
        400:
          description: Bad request
          content: { }
        401:
          description: Unauthorized
          content: { }
        403:
          description: Forbidden
          content: { }
        404:
          description: Not Found
          content: { }
        500:
          description: Internal service error
          content: { }
        503:
          description: Service Unavaliable
          content: { }

components:
  schemas:
    EpkId:
      xml:
        prefix: sbol
      description: ЕПК ИД клиента
      type: string
      maxLength: 50
      example: "1485932906320904044"
    lcRevokeRq:
      description: Запрос на отзыв аккредитива ФЛ
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        epkId:
          $ref: '#/components/schemas/EpkId'
        trustedParty:
          $ref: '#/components/schemas/TrustedParty'
        application:
          $ref: '#/components/schemas/RevokeApplication'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [epkId, application]
    RevokeApplication:
      description: Заявление на отзыв аккредитива
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseApplication'
        - type: object
          properties:
            additionalParams:
              $ref: '#/components/schemas/LcAmendmentRevocationConfirmationParams'
          required: [additionalParams]
    lcAmendRq:
      description: Запрос на изменение аккредитива ФЛ
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        epkId:
          xml:
            prefix: sbol
          description: ЕПК ИД клиента
          type: string
          maxLength: 50
          example: "1485932906320904044"
        trustedParty:
          $ref: '#/components/schemas/TrustedParty'
        application:
          $ref: '#/components/schemas/AmendApplication'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [epkId, application]
    AmendApplication:
      description: Заявление на изменение аккредитива
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseApplication'
        - type: object
          properties:
            lcAmendment:
              $ref: '#/components/schemas/LetterOfCreditAmendment'
            additionalParams:
              $ref: '#/components/schemas/LcAmendmentRevocationConfirmationParams'
          required: [lcAmendment, additionalParams]
    IssueApplication:
      description: Заявление на открытие аккредитива
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      allOf:
        - $ref: '#/components/schemas/BaseApplication'
        - type: object
          properties:
            lc:
              $ref: '#/components/schemas/BaseLc'
            lcIssueParams:
              $ref: '#/components/schemas/LcIssueConfirmationParams'
          required: [lc, lcIssueParams]
    BaseApplication:
      description: Базовый класс всех заявлений
      type: object
      xml:
        prefix: sbol
      properties:
        signDate:
          description: Дата и время подписания заявления
          type: string
          xml:
            prefix: sbol
          format: dateTime
          example: "2021-10-04T15:26:02.585+03:00"
        applicationBankUnit:
          $ref: '#/components/schemas/BankUnit'
        operatorId:
          description: Табельный номер сотрудника ВСП, создавшего заявление
          type: string
          xml:
            prefix: sbol
          maxLength: 10
          example: 2629327207
        operatorName:
          description: ФИО сотрудника ВСП, создавшего заявление
          type: string
          xml:
            prefix: sbol
          maxLength: 300
          example: Иванов Иван Иванович
      required: [signDate, applicationBankUnit]
    LcAmendmentRevocationConfirmationParams:
      description: Параметры сделки нужные при подтверждении изменения/отзыва аккредитива
      type: object
      xml:
        prefix: sbol
      properties:
        reference:
          description: референс отзываемой/изменяемой сделки
          type: string
          xml:
            prefix: sbol
          maxLength: 50
          example: E2343322005
        productType:
          $ref: '#/components/schemas/ProductType'
        bankMarks:
          $ref: '#/components/schemas/ConditionTexts'
        specialInstructions:
          $ref: '#/components/schemas/ConditionTexts'
        commission:
          $ref: '#/components/schemas/Commission'
        mortgageManagerApproval:
          $ref: '#/components/schemas/Approval'
        returnCoverage:
          $ref: '#/components/schemas/ReturnCoverage'
    ReturnCoverage:
      description: Счет возврата покрытия. Передается, если отличается от счета плательщика
      type: object
      xml:
        prefix: sbol
      properties:
        returnAccount:
          description: Счет возврата покрытия
          type: string
          xml:
            prefix: sbol
          pattern: '\d{20,25}'
        bankDetails:
          $ref: '#/components/schemas/BankDetails'
    LcIssueConfirmationParams:
      description: Параметры сделки нужные при открытии аккредитива
      type: object
      xml:
        prefix: sbol
      properties:
        reference:
          description: референс аккредитива
          type: string
          xml:
            prefix: sbol
          maxLength: 50
          example: E2343322005
        conditions:
          $ref: '#/components/schemas/LcIssueConditionsWithBankMarks'
        commission:
          $ref: '#/components/schemas/Commission'
        mortgageManagerApproval:
          $ref: '#/components/schemas/Approval'
    Approval:
      description: Согласование заявления
      type: object
      xml:
        prefix: sbol
      properties:
        status:
          description: статус согласования
          type: string
          xml:
            prefix: sbol
          example: Согласован
        role:
          description: роль согласующего
          type: string
          xml:
            prefix: sbol
          example: Руководитель
        approver:
          type: string
          xml:
            prefix: sbol
        time:
          description: время согласования
          type: string
          format: dateTime
          xml:
            prefix: sbol
          example: "2021-10-04T15:26:02.585+03:00"
        comment:
          description: комментарий согласующего
          type: string
          xml:
            prefix: sbol
      required: [status,role]
    ConditionTexts:
      description: Условия аккредитива
      type: array
      xml:
        prefix: sbol
      items:
        properties:
          Paragraph:
            description: Текстовый параграф описания
            type: string
            xml:
              prefix: sbol
            maxLength: 2000
            example: Пример одного параграфа тескста дополнительных условий, с которыми соглашается клиент при подписании аккредитива
        required: [Paragraph]
    LetterOfCreditAmendment:
      description: Параметры аккредитива для изменения
      type: object
      xml:
        prefix: sbol
      properties:
        amount:
          description: Сумма сделки
          xml:
            prefix: sbol
          type: integer
          example: 12300
        applicant:
          $ref: '#/components/schemas/Party'
        plannedExpirationDate:
          description: Дата истчечения
          xml:
            prefix: sbol
          type: string
          format: date
          example: 2021-08-20+03:00
        hasVat:
          description: Признак НДС
          xml:
            prefix: sbol
          type: boolean
          example: false
        isTransferable:
          description: Признак допустимости исполнения 3му лицу
          xml:
            prefix: sbol
          type: boolean
          example: false
        isPartialAvailabilityAllowed:
          description: Признак допустимости частичного исполнения
          xml:
            prefix: sbol
          type: boolean
          example: false
        paymentPurpose:
          description: Назначение платежа
          xml:
            prefix: sbol
          type: string
          maxLength: 7000
          example: "Оплата по ДКП №300 от 15.02.2022 за земельный участок с кадастровым номером 23:343:34"
        applicantPhone:
          description: Номер телефона платльщика
          xml:
            prefix: sbol
          type: string
          maxLength: 100
          example: 89996788767
        applicantAccount:
          xml:
            prefix: sbol
          pattern: \d{20,25}
          type: string
          description: Счёт плательщика
          example: "30101810400000000225"
        beneficiary:
          $ref: '#/components/schemas/Party'
        saleContract:
          $ref: '#/components/schemas/SaleContract'
        setOfSubmittedDocuments:
          xml:
            prefix: sbol
          properties:
            submittedDocument:
              $ref: '#/components/schemas/SetOfSubmittedDocuments'
        isEGRNStatementExecutionAllowed:
          description: Признак НДС
          xml:
            prefix: sbol
          type: boolean
          example: false
    ErrorRfc7807:
      xml:
        prefix: sbol
      type: object
      description: Блок с ошибками
      properties:
        status:
          xml:
            prefix: sbol
          description: Статус ошибки
          type: integer
          example: 503
        message:
          xml:
            prefix: sbol
          description: Текстовое описание ошибки
          type: string
          example: Service Unavailable

    lcConditionsRq:
      description: Запрос получения референса и доп. условий аккредитива ФЛ
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        reference:
          type: string
          xml:
            prefix: sbol
          description: Референс
          example: "38E21002285"
        lc:
          xml:
            prefix: sbol
          allOf:
            -  type: object
               properties:
                 "xsi:type":
                   type: string
                   enum:
                     - "sbol:RealtyLetterOfCredit"
                   xml:
                     attribute: true
            - oneOf:
                - $ref: '#/components/schemas/RealtyLetterOfCredit'
                - $ref: '#/components/schemas/OtherLetterOfCredit'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [lc]

    lcConditionsRs:
      description: Ответ получения референса и доп. условий аккредитива ФЛ
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      oneOf:
        - $ref: '#/components/schemas/LcConditions'
        - $ref: '#/components/schemas/ErrorRfc7807'
    lcIssueRs:
      description: Ответ на запрос открытия аккредитива ФЛ
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        error:
          $ref: '#/components/schemas/ErrorRfc7807'
    lcAmendRs:
      description: Ответ на запрос изменения аккредитива ФЛ
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        error:
          $ref: '#/components/schemas/ErrorRfc7807'
    lcRevokeRs:
      description: Ответ на запрос отзыва аккредитива ФЛ
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        error:
          $ref: '#/components/schemas/ErrorRfc7807'
    lcTransferRs:
