    BankDetails:
      xml:
        prefix: sbol
      description: Набор реквизитов банка
      type: object
      properties:
        name:
          xml:
            prefix: sbol
          maxLength: 500
          type: string
          description: Наименование банка
          example: ПАО 'Сбербанк'
        swift:
          xml:
            prefix: sbol
          maxLength: 11
          minLength: 8
          type: string
          description: SWIFT код банка
          example: SABRRUMM
        country:
          xml:
            prefix: sbol
          maxLength: 500
          type: string
          description: Страна банка
          example: Никарагуа
        city:
          xml:
            prefix: sbol
          maxLength: 500
          type: string
          description: Город банка
          example: Манагуа
        bic:
          xml:
            prefix: sbol
          pattern: \d9
          type: string
          description: БИК банка
          example: "445252295"
        correspondentAccount:
          xml:
            prefix: sbol
          pattern: \d{20,25}
          type: string
          description: Корр. счёт банка
          example: "30101810400000000225"
