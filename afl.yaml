        address:
          xml:
            prefix: sbol
          maxLength: 500
          type: string
          minLength: 5
          dfdsf: 5
          nullable: true
          description: Адрес подразделения
          example: 143124, г. Москва, ул. Пушкина, д. 106к4
        code:
          xml:
            prefix: sbol
          maxLength: 5
          type: string
          description: Код ОСБ
          example: "9832"
        regionalBankCode:
          xml:
            prefix: sbol
          maxLength: 2
          type: string
          description: Код ТБ
          example: "38"
        subBranchCode:
          xml:
            prefix: sbol
          maxLength: 10
          type: string
          description: Код ВСП
        sbIdnt:
          xml:
            prefix: sbol
          pattern: \d4
          type: string
          description: Код филиала (ИД участника)
          example: "3800"
