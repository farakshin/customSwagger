      enum:
        - PAYMENT_AT_SIGN
        - DEF_PAYMENT
    AmountWithCurrency:
      xml:
        prefix: sbol
      type: object
      description: Сумма и код валюты
      properties:
        amount:
          xml:
            prefix: sbol
          type: number
          description: сумма
        currency:
          xml:
            prefix: sbol
          maxLength: 3
          type: string
          description: Валюта
          example: RUB
      required: [amount,currency]
    ProductType:
      xml:
        prefix: sbol
      type: string
      description: Тип сделки
      example: REALTY
      enum:
        - REALTY
        - REALTY_ESCROW
        - OTHER_PRODUCT
        - LOGISTICS
        - AUTO

