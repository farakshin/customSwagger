        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        epkId:
          xml:
            prefix: sbol
          description: ЕПК ИД клиента
          type: string
          maxLength: 50
          example: "1485932906320904044"
        trustedParty:
          $ref: '#/components/schemas/TrustedParty'
        application:
          $ref: '#/components/schemas/IssueApplication'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [epkId, application]

    LcIssueConditionsWithBankMarks:
      description: Условия открытия акккредитива, с которыми соглашается клиент
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      allOf:
        - $ref: '#/components/schemas/BaseLcIssueConditions'
        - type: object
          xml:
            prefix: sbol
          properties:
            bankMarks:
              $ref: '#/components/schemas/ConditionTexts'
    lcTransferRq:
      description: Запрос на трансферацию
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        epkId:
          xml:
            prefix: sbol
          description: ЕПК получателя
          type: string
          maxLength: 50
          example: "1485932906320904044"
        trustedParty:
          $ref: '#/components/schemas/TrustedParty'
        application:
          $ref: '#/components/schemas/TransferApplication'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [epkId, application]
    TransferApplication:
      description: Заявление на трансферацию
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseApplication'
        - type: object
          properties:
            lcTransfer:
              $ref: '#/components/schemas/LetterOfCreditTransfer'
            additionalParams:
              $ref: '#/components/schemas/LcAmendmentRevocationConfirmationParams'
          required: [lcTransfer, additionalParams]
    LetterOfCreditTransfer:
      description: Параметры аккредитива для трансферации
      type: object
      xml:
        prefix: sbol
      properties:
        transferId:
          xml:
            prefix: sbol
          description: id трансферации
          type: string
          pattern: \d+
          maxLength: 40
          example: "1485932906320904044"
      # to do
      #     transferDocument:
      #       xml:
      #         prefix: sbol
      #       description: Комплект представляемых документов (только документы для трансферации)
      #       type: array
      #       items:
      #         $ref: '#/components/schemas/SubmittedDocument'
      oneOf:
        - type: object
          properties:
            toLegalOrIndividualParty:
              allOf:
                - type: object
                  xml:
                    prefix: sbol
                  properties:
                    amount:
                      $ref: '#/components/schemas/AmountWithCurrency'
                - type: object
                  properties:
                    hasVat:
                      description: Признак НДС
                      xml:
                        prefix: sbol
                      type: boolean
                      example: false
                - type: object
                  properties:
                    beneficiary:
                      $ref: '#/components/schemas/Party'
          required: [ toLegalOrIndividualParty ]
        - type: object
          properties:
            toSberbank:
              $ref: '#/components/schemas/CreditContractShort'
          required: [ toSberbank ]
      required: [epkId]
    CreditContractShort:
      description: Договор ипотеки, используемый при покупке недвижимости через аккредитив
      type: object
      xml:
        prefix: sbol
      properties:
        reference:
          xml:
            prefix: sbol
          description: номер кредитного договора
          type: string
          maxLength: 100
          example: 131289383
        date:
          xml:
            prefix: sbol
          type: string
          description: дата кредитного договора
          format: date
          example: 2021-08-20+03:00
        regionalBankCode:
          xml:
            prefix: sbol
          maxLength: 2
          type: string
          description: Код ТБ
          example: "38"

    lcDocumentsForExecutionRq:
      description: Запрос на передачу документов для раскрытия
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        epkId:
          $ref: '#/components/schemas/EpkId'
        trustedParty:
          $ref: '#/components/schemas/TrustedParty'
        application:
          $ref: '#/components/schemas/DocumentsForExecutionApplication'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [application]
    DocumentsForExecutionApplication:
      description: Заявление на передачу документов для раскрытия
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseApplication'
        - type: object
          properties:
            documents:
              $ref: '#/components/schemas/Documents'
            additionalParams:
              $ref: '#/components/schemas/LcAmendmentRevocationConfirmationParams'
            documentRequirements:
              $ref: '#/components/schemas/SubmittedDocument'
          required: [additionalParams]
    Documents:
      description: Тип, описывающий набор атрибутов документов для раскрытия
      type: object
      properties:
        party:
          description: сторона, предоставляющая документы
          type: string
          enum:
            - BENEFICIARY
            - APPLICANT
            - BANK
            - THIRD_SIDE
        attachments:
          type: object
          properties:
            attachment:
              type: array
              items:
                $ref: '#/components/schemas/Attachment'
    TrustedParty:
      description: Тип, описывающий доверенное лицо, оформляющее заявление
      type: object
      properties:
        trustedPerson:
          $ref: '#/components/schemas/Person'
        epkId:
          $ref: '#/components/schemas/EpkId'
        uddkDocumentID:
          description: ID документа в системе УДДК
          type: string
          maxLength: 50
          xml:
            prefix: sbol
        documentType:
          description: Тип документа
          type: string
          xml:
            prefix: sbol
          maxLength: 255
        numberDocument:
          description: Номер документа
          type: string
          xml:
            prefix: sbol
          maxLength: 50
        dateDocument:
          description: Дата регистрации документа
          type: string
          xml:
            prefix: sbol
          format: dateTime
        notaryPerson:
          $ref: '#/components/schemas/Person'

    lcConsentExtractRequestRq:
      description: Запрос на получение согласия на запрос выписки
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        epkId:
          $ref: '#/components/schemas/EpkId'
        application:
          $ref: '#/components/schemas/ConsentExtractRequestApplication'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [epkId, application]
    ConsentExtractRequestApplication:
      description: Заявление на получение согласия на запрос выписки
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseApplication'
        - type: object
          required: [consentExtractRequest,additionalParams]
          properties:
            consentExtractRequest:
              $ref: '#/components/schemas/ConsentExtractRequest'
            additionalParams:
              $ref: '#/components/schemas/LcAmendmentRevocationConfirmationParams'
    ConsentExtractRequest:
      description: Согласие клиента на запрос выписки
      type: object
      required: [OID,isConsent]
      xml:
        prefix: sbol
      properties:
        OID:
          description: Идентификатор пользователя на портале Госуслуги
          type: string
          xml:
            prefix: sbol
          maxLength: 50
        isConsent:
          description: Признак согласия клиента на запрос выписки на портале Госуслуг
          type: boolean
          xml:
            prefix: sbol
        notes:
          description: Текстовое поле для дополнительной информации о согласии клиента на запрос выписки
          type: string
          xml:
            prefix: sbol
          maxLength: 500
        expireDate:
          description: Дата окончания действия согласия на запрос выписки
          type: string
          xml:
            prefix: sbol
          format: dateTime

    lcApplicationAcceptRq:
      description: Запрос на подтверждение заявления
      type: object
      xml:
        namespace: http://sbolpro.afl.tfido.sbrf.ru
        prefix: sbol
      properties:
        epkId:
          $ref: '#/components/schemas/EpkId'
        trustedParty:
          $ref: '#/components/schemas/TrustedParty'
        application:
          $ref: '#/components/schemas/ApplicationAccept'
        "xmlns:xsi":
          type: string
          enum:
            - "http://www.w3.org/2001/XMLSchema-instance"
          xml:
            attribute: true
      required: [ epkId, application ]
    ApplicationAccept:
      description: Заявление на согласие/отказ
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseApplication'
        - type: object
          required: [ applicationAccept,additionalParams ]
          properties:
            applicationAccept:
              $ref: '#/components/schemas/ApplicationParameters'
            additionalParams:
              $ref: '#/components/schemas/LcAmendmentRevocationConfirmationParams'
    ApplicationParameters:
      description: Параметры заявления на согласие/отказ
      type: object
      xml:
        prefix: sbol
      required: [processId,applicationType,approve]
      properties:
        processId:
          description: Id заявления
          type: string
          xml:
            prefix: sbol
          maxLength: 20
        applicationType:
          description: Тип заявления
          type: string
          enum:
            - AMENDMENT
            - REVOCATION
            - EXECUTION
          xml:
            prefix: sbol
        approve:
          description: Решение (true = согласие, false = отказ)
          type: boolean
          xml:
            prefix: sbol
        description:
          description: Комментарий принимавшего решение
          type: string
          maxLength: 1000
          xml:
            prefix: sbol