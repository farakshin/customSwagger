          xml:
            prefix: sbol
          properties:
            reference:
              xml:
                prefix: sbol
              description: Референс сделки
              type: string
              maxLength: 50
              example: E423432423
          required: [ reference ]

    BaseLcIssueConditions:
      xml:
        prefix: sbol
      type: object
      description: Тип, описывающий базовый класс всех заявлений
      properties:
        amountInWords:
          xml:
            prefix: sbol
          description: Сумма прописью
          type: string
          example: Восемь рублей 00 копеек
        documentsPresentationBankUnits:
          $ref: '#/components/schemas/ConditionTexts'
        additionalConditions:
          $ref: '#/components/schemas/ConditionTexts'
        specialInstructions:
          $ref: '#/components/schemas/ConditionTexts'
        disclaimer:
          $ref: '#/components/schemas/ConditionTexts'
        applicantConfirmations:
          $ref: '#/components/schemas/ConditionTexts'
      required: [ amountInWords ]

    OtherLetterOfCredit:
      description: Аккредитив на иное
      allOf:
        - $ref: '#/components/schemas/BaseLc'
    RealtyLetterOfCredit:
      description: Аккредитив на недвижимость
      allOf:
        - $ref: '#/components/schemas/BaseLc'
        - type: object
          properties:
            creditContract:
              $ref: '#/components/schemas/CreditContract'
            isAlternative:
              description: Признак альтернативной сделки
              xml:
                prefix: sbol
              type: boolean
              example: false
            isMortgage:
              description: Признак наличия ипотеки
              xml:
                prefix: sbol
              type: boolean
              example: false
            isEGRNStatementExecutionAllowed:
              description: Признак допустимости раскрытия по выписке
              xml:
                prefix: sbol
              type: boolean
              example: false
            ownFundsAmount:
              description: Сумма собственных средств
              xml:
                prefix: sbol
              type: number
              example: 300
            ownFundsAccountNumber:
              description: Счет для списания покрытия за счет собственных средств
              xml:
                prefix: sbol
              pattern: \d{20,25}
              type: string
              example: "40801810400000000225"
    Attachment:
      description: Вложения по аккредитиву
      xml:
        prefix: sbol
      type: object
      properties:
        MIMEtype:
          description: Тип данных
          xml:
            prefix: sbol
          type: string
          maxLength: 100
          example: pdf
        filename:
          description: Имя файла
          xml:
            prefix: sbol
          type: string
          maxLength: 100
          example: document314323.pdf
        ecmId:
          description: id файла в системе ЕСМ
          xml:
            prefix: sbol
          type: string
          maxLength: 100
          example: 312312312312fdf332
        attachmentType:
          $ref: '#/components/schemas/AttachmentType'
    Commission:
      description: Коммиссия
      type: object
      xml:
        prefix: sbol
      properties:
        code:
          description: Код тарифа коммиссии
          xml:
            prefix: sbol
          type: string
          maxLength: 50
          example: 603
        amount:
          $ref: '#/components/schemas/AmountWithCurrency'
        chargesAccount:
          xml:
            prefix: sbol
          pattern: \d{20,25}
          type: string
          description: Номер счета для списания коммиссии
          example: "30101810400000000225"
        chargesPayingParty:
          $ref: '#/components/schemas/ChargesPayingType'
    ChargesPayingType:
      description: Плательщик по коммиссии
      xml:
        prefix: sbol
      type: string
      enum:
        - APPLICANT
        - BENEFICIARY
    AttachmentType:
      description: тип вложения
      xml:
        prefix: sbol
      type: string
      enum:
        - LC_TEXT
        - PAYMENT
      example: PAYMENT
    CreditContract:
      description: Договор ипотеки, используемый при покупке недвижимости через аккредитив
      type: object
      xml:
        prefix: sbol
      properties:
        reference:
          xml:
            prefix: sbol
          description: номер кредитного договора
          type: string
          maxLength: 100
          example: 131289383
        date:
          xml:
            prefix: sbol
          type: string
          description: дата кредитного договора
          format: date
          example: 2021-08-20+03:00
        amount:
          $ref: '#/components/schemas/AmountWithCurrency'
        creditFundsAccountNumber:
          xml:
            prefix: sbol
          pattern: \d{20,25}
          type: string
          description: Счёт для списания покрытия за счет кредитных средств
          example: "40801810400000000225"

    BaseLc:
      description: Данные заявления физического лица
      type: object
      xml:
        prefix: sbol
      properties:
        productType:
          $ref: '#/components/schemas/ProductType'
        amount:
          $ref: '#/components/schemas/AmountWithCurrency'
        plannedExpirationDate:
          xml:
            prefix: sbol
          type: string
          description: Плановая дата истечения
          format: date
          example: 2021-08-20+03:00
        isRevocable:
          xml:
            prefix: sbol
          type: boolean
          description: Признак отзывности
          example: true
        isCovered:
          xml:
            prefix: sbol
          type: boolean
          description: Признак покрытия
          example: false
        isLcForeign:
          xml:
            prefix: sbol
          type: boolean
          description: Признак международного аккредитива
          example: true
        availabilityType:
          $ref: '#/components/schemas/AvailabilityType'
        hasVat:
          xml:
            prefix: sbol
          type: boolean
          description: Признак НДС
          example: true
        isTransferable:
          xml:
            prefix: sbol
          type: boolean
          description: Признак допустимости исполнения третьему лицу
          example: true
        isPartialAvailabilityAllowed:
          xml:
            prefix: sbol
          type: boolean
          description: Признак допустимости частичного исполнения
          example: true
        issuingBank:
          $ref: '#/components/schemas/BankDetails'
        nominatedBank:
          $ref: '#/components/schemas/BankDetails'
        advisingBank:
          $ref: '#/components/schemas/BankDetails'
        paymentPurpose:
          xml:
            prefix: sbol
          maxLength: 7000
          type: string
          description: Назначение платежа
          example: Платеж по договору №100500
        applicant:
          $ref: '#/components/schemas/Party'
        beneficiary:
          $ref: '#/components/schemas/Party'
        saleContract:
          $ref: '#/components/schemas/SaleContract'
        setOfSubmittedDocuments:
          xml:
            prefix: sbol
          properties:
            submittedDocument:
              $ref: '#/components/schemas/SetOfSubmittedDocuments'
        documentPresentationPeriodType:
          $ref: '#/components/schemas/DocumentPresentationPeriodType'
        draftIssueParams:
          $ref: '#/components/schemas/LcDraftIssue'
      required: [productType, amount,plannedExpirationDate,isRevocable,isCovered,isLcForeign,availabilityType,hasVat,isTransferable,isPartialAvailabilityAllowed,issuingBank,
                 nominatedBank,advisingBank,paymentPurpose,applicant,beneficiary,documentPresentationPeriodType,]
    LcDraftIssue:
      xml:
        prefix: sbol
      description: Параметры черновика, нужные при открытии аккредитива
      type: object
      properties:
        applicationDraftId:
          xml:
            prefix: sbol
          description:  Идентификатор черновика заявления
          type: string
          maxLength: 50
          example: 8756093047087
        draftChannel:
          $ref: '#/components/schemas/DraftChannelType'
        draftHash:
          xml:
            prefix: sbol
          description: Хэш черновика
          type: string
          maxLength: 500
          example: Rhd643kTgdlow8jsgdtwkdb78Fr
      required: [applicationDraftId]
    DraftChannelType:
      xml:
        prefix: sbol
      description: каналы поступления черновика АФЛ
      type: string
      enum:
        - SBER_API_DOMCLICK
        - SBER_API_DEVELOPER
        - INTERNAL_CHANNEL
        - INTERNAL_PSC
        - SBBOL_DOMCLICK
        - SBBOL_DEVELOPER
      example: INTERNAL_CHANNEL
    DocumentPresentationPeriodType:
      xml:
        prefix: sbol
      description: Период предоставления документов
      type: string
      enum:
        - WITHIH_LC_VALIDITY
        - OTHER
    SaleContract:
      xml:
        prefix: sbol
      allOf:
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/SaleContractType'
        - type: object
          properties:
            reference:
              xml:
                prefix: sbol
              description: Номер договора
              type: string
              maxLength: 100
              example: 100500
            date:
              xml:
                prefix: sbol
              description: Дата договора
              type: string
              format: date
              example: 2021-08-20+03:00
            objectOfSale:
              xml:
                prefix: sbol
              oneOf:
                - properties:
                    realtyObjectOfSale:
                      $ref: '#/components/schemas/RealtyObjectOfSale'
                - properties:
                    otherObjectOfSale:
                      $ref: '#/components/schemas/OtherObjectOfSale'
            buyer:
              xml:
                prefix: sbol
              properties:
                person:
                  $ref: '#/components/schemas/ContractParty'
            seller:
              xml:
                prefix: sbol
              properties:
                person:
                  $ref: '#/components/schemas/ContractParty'
            setOfSubmittedDocuments:
              xml:
                prefix: sbol
              properties:
                submittedDocument:
                  $ref: '#/components/schemas/SetOfSubmittedDocuments'
    SetOfSubmittedDocuments:
      xml:
        prefix: sbol
      description: Комплект документов для предоставления (по И)
      type: array
      items:
        $ref: '#/components/schemas/SubmittedDocument'
    SubmittedDocument:
      xml:
        prefix: sbol
      description: Документ для предоставления (в случае, если больше одного - читается по ИЛИ)
      type: object
      properties:
        submittedDocumentText:
          xml:
            prefix: sbol
          description: Текст документа для предоставления
          type: string
          maxLength: 10000
          example: ДКП №100500 от 15 января 2022 года
        submittedDocumentType:
          xml:
            prefix: sbol
          description: Тип документа для исполнения
          type: string
          enum:
            - SALES_CONTRACT
            - EGRN
      required: [submittedDocumentText]
    ContractParty:
      xml:
        prefix: sbol
      description: Сторона договора покупателя или продавца, ФЛ или ЮЛ
      oneOf:
        - $ref: '#/components/schemas/Person'
        - $ref: '#/components/schemas/CompanyContractParty'
    CompanyContractParty:
      xml:
        prefix: sbol
      description: Имя организации - покупателя или продавца
      type: string
      maxLength: 300
      example: ООО "Рог и Копыто"
    OtherObjectOfSale:
      xml:
        prefix: sbol
      description: Иной объект продажи
      type: string
      maxLength: 1000
      example: "Пасека в составе 300 ульев, расположенная по адресу: 156 км. Новорязанского шоссе"
    RealtyObjectOfSale:
      xml:
        prefix: sbol
      description: Данные об объекте недвижимости
      type: object
      properties:
        realtyType:
          $ref: '#/components/schemas/RealtyObjectType'
        address:
          xml:
            prefix: sbol
          description: Адрес объекта недвижимости
          type: string
          maxLength: 500
          example: г. Пушкино, ул. Московская, д. 4к32
        cadastralNumber:
          xml:
            prefix: sbol
          description: Кадастровый номер
          type: array
          items:
            type: string
            maxLength: 40
            example: 43:4355:34:4343
        realtyObjectDescription:
          xml:
            prefix: sbol
          description: описание иного объекта недвижимости
          type: string
          maxLength: 1000
          example: Строительная бытовка повышенной комфортности
      required: [realtyType,address]
    RealtyObjectType:
      xml:
        prefix: sbol
      description: Типы недвижимости
      type: string
      enum:
        - APARTMENT
        - FLAT
        - FLAT_PART
        - ROOMS
        - FLAT_OWNERSHIP_INTEREST
        - HOUSE
        - HOUSE_PART
        - HOUSE_OWNERSHIP_INTEREST
        - COUNTRY_HOUSE
        - GARDEN_COTTAGE
        - GARAGE
        - PARKING_SLOT
        - LAND
        - LAND_LEASEHOLD_INTEREST
        - LAND_OWNERSHIP_INTEREST
        - UNFINISHED_BUILDING
        - BIKE_SLOT
        - NON_RESIDENTAL
        - STORAGE
        - OTHER_REALTY
      example: FLAT
    SaleContractType:
      xml:
        prefix: sbol
      description: Типы договоров по недвижимости
      type: string
      enum:
        - SALES
        - EQUITY_PARTICIPATION
        - ASSIGNMENT_OF_CLAIMS
      example: SALES
    Party:
      xml:
        prefix: sbol
      allOf:
        - type: object
          properties:
            epkId:
              xml:
                prefix: sbol
              maxLength: 50
              type: string
              description: ЕПК ИД
              example: "1533131296748209573945"
            isResident:
              xml:
                prefix: sbol
              type: boolean
              description: Признак резиденства
              example: true
            #   countryCode:
            #     xml:
            #       prefix: sbol
            #     maxLength: 3
            #     type: string
            #     description: Код страны
            #    example: NIC
            bank:
              $ref: '#/components/schemas/BankDetails'
            account:
              xml:
                prefix: sbol
              pattern: \d{20,25}
              type: string
              description: Счёт
              example: "40801810400000000225"
            isSberbankAccount:
              xml:
                prefix: sbol
              type: boolean
              description: Признак счёта Сбербанка
              example: false
            bankUnit:
              $ref: '#/components/schemas/BankUnit'
            notificationChannels:
              $ref: '#/components/schemas/lcNotificationType'
          required: [bank,account,isSberbankAccount,notificationChannels]
        - type: object
          oneOf:
            - properties:
                legalParty:
                  $ref: '#/components/schemas/LegalParty'
              required: [LegalParty]
            - properties:
                individualParty:
                  $ref: '#/components/schemas/IndividualParty'
              required: [IndividualParty]
    LegalParty:
      xml:
        prefix: sbol
      description: данные стороны сделки - ЮЛ
      type: object
      properties:
        legalName:
          xml:
            prefix: sbol
          description: Наименование ЮЛ
          type: string
          maxLength: 300
          example: "ООО Кубаньстройпро"
        taxId:
          xml:
            prefix: sbol
          description: ИНН ЮЛ
          type: string
          pattern: \d{10,12}
          example: "735194754212"
        contactPersons:
          type: array
          items:
            $ref: '#/components/schemas/ContactPersons'
        contactDetails:
          $ref: '#/components/schemas/ContactDetails'
      required: [legalName,taxId]
    IndividualParty:
      xml:
        prefix: sbol
      description: данные стороны сделки - ФЛ.
      type: object
      properties:
        person:
          $ref: '#/components/schemas/Person'
        taxId:
          xml:
            prefix: sbol
          description: ИНН ФЛ
          type: string
          pattern: \d{10,12}
          example: "7351947542"
        contactDetails:
          $ref: '#/components/schemas/ContactDetails'
        idDocument:
          $ref: '#/components/schemas/IdentDocument'
      required: [person]
    IdentDocument:
      xml:
        prefix: sbol
      description: паспортные данные
      type: object
      properties:
        birthDate:
          xml:
            prefix: sbol
          description: Дата рождения
          type: string
          format: date
          example: 2021-08-20+03:00
        documentSeries:
          xml:
            prefix: sbol
          description: Серия паспорта РФ
          type: string
          pattern: \d{4}
          example: 4601
        documentNumber:
          xml:
            prefix: sbol
          description: Номер паспорта РФ
          type: string
          pattern: \d{6}
          example: 445822
      required: [documentSeries,documentNumber]
    Person:
      xml:
        prefix: sbol
      description: ФИО
      type: object
      properties:
        firstName:
          xml:
            prefix: sbol
          description: Имя
          type: string
          maxLength: 255
          example: Александр
        lastName:
          xml:
            prefix: sbol
          description: Фамилия
          type: string
          maxLength: 255
          example: Матросов
        middleName:
          xml:
            prefix: sbol
          description: Отчество
          type: string
          maxLength: 255
          example: Иванович
      required: [firstName,lastName]
    ContactPersons:
      xml:
        prefix: sbol
      description: Контактные лица организации
      type: object
      properties:
        contactPerson:
          $ref: '#/components/schemas/ContactPerson'
      required: [contactPerson]
    ContactPerson:
      xml:
        prefix: sbol
      description: описание персоны
      type: object
      properties:
        name:
          xml:
            prefix: sbol
          description: ФИО контактного лица
          type: string
          maxLength: 300
          example: Александр Иванович Матросов
        contactDetails:
          $ref: '#/components/schemas/ContactDetails'
    ContactDetails:
      xml:
        prefix: sbol
      description: описание контактов
      type: object
      properties:
        phone:
          xml:
            prefix: sbol
          description:  телефон
          type: string
          maxLength: 100
          example: 88005553535
        email:
          xml:
            prefix: sbol
          description: email адрес
          type: string
          example: dfdf@ru.ru
    lcNotificationType:
      xml:
        prefix: sbol
      description: Способы уведомления получателя или плательщика
      type: object
      properties:
        NotificationChannel:
          xml:
            prefix: sbol
          type: string
          enum:
            - BRANCH
            - SWIFT
            - SBOL
            - EMAIL
            - SBBOL
            - E_INVOICING
            - OTHER_NOTIFICATION
          example: SBOL
      required: [NotificationChannel]
    BankUnit:
      xml:
        prefix: sbol
      description: Подразделение банка
      type: object
      properties:
        name:
          xml:
            prefix: sbol
          maxLength: 300
          type: string
          description: Наименование подразделения
